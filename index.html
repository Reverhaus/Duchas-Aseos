                        <body>
                            <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#bdc800">
    <meta name="description" content="App para gestión de duchas y aseo de residentes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aseo">
    <title>Gestión de Aseo - UCC/UAD</title>
    <link rel="manifest" href="/Duchas-Aseos/manifest.json">
    <link rel="apple-touch-icon" href="/Duchas-Aseos/icons/icon-192.png">
    <link rel="icon" type="image/png" href="/Duchas-Aseos/icons/icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Mono', monospace; -webkit-tap-highlight-color: transparent; background: #fafaf8; }
        
        :root {
            --primary: #bdc800;
            --primary-dark: #9db000;
            --secondary: #235b4e;
            --secondary-light: #3d7a6b;
            --accent: #e3a352;
            --accent-dark: #c98d3a;
            --gray: #cccccc;
            --gray-dark: #999999;
            --border-color: #3d7a6b;
            --border-width: 2px;
            --shadow-offset: 3px;
        }
        
        * { border-radius: 0 !important; }
        
        .brutal-border { 
            border: var(--border-width) solid var(--border-color); 
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0 var(--gray);
            transition: all 0.2s;
        }
        
        .brutal-btn { 
            border: var(--border-width) solid var(--border-color); 
            box-shadow: 2px 2px 0 var(--gray);
            transition: all 0.1s;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 10px;
            cursor: pointer;
        }
        .brutal-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--gray); }
        
        .priority-top { border-left: 4px solid var(--accent); background: rgba(227, 163, 82, 0.5); }
        .priority-meal { border-left: 4px solid var(--primary); background: rgba(189, 200, 0, 0.5); }
        .priority-normal { border-left: 4px solid var(--gray); background: white; }
        
        .completed-card { opacity: 0.35; filter: grayscale(80%); }
        .completed-card .poo-btn-active { filter: grayscale(0%); opacity: 1; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .card-swiping { transition: transform 0.05s linear !important; }
        
        .swipe-indicator {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            opacity: 0;
            transition: opacity 0.15s;
            pointer-events: none;
            font-weight: 700;
        }
        .swipe-indicator.left { left: 15px; color: var(--primary); }
        .swipe-indicator.right { right: 15px; color: var(--primary); }
        .card.swiping-left .swipe-indicator.left { opacity: 1; }
        .card.swiping-right .swipe-indicator.right { opacity: 1; }
        
        .particle {
            position: fixed;
            width: 6px;
            height: 6px;
            animation: particleFade 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            pointer-events: none;
            z-index: 1000;
        }
        @keyframes particleFade {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }
        
        .section-highlight { animation: sectionGlow 0.4s ease-out; }
        @keyframes sectionGlow {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(189, 200, 0, 0.15); }
        }
        
        .priority-badge, .meal-badge {
            position: absolute; top: -4px; right: -4px;
            color: white; font-size: 9px; font-weight: 700;
            padding: 2px 5px; border: 1px solid var(--border-color);
            box-shadow: 1px 1px 0 var(--gray);
            z-index: 10;
        }
        .priority-badge { background: var(--accent); }
        .meal-badge { background: var(--primary); }
        
        .day-badge {
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-color); font-weight: 700; font-size: 9px;
            text-transform: uppercase; flex-shrink: 0; font-family: 'Roboto Mono', monospace;
        }
        .day-has-shower-today { background: var(--accent); color: white; }
        .day-has-shower-other { background: var(--secondary); color: white; }
        .day-no-shower { background: var(--gray); color: #999; }
        
        .room-badge {
            background: var(--primary); color: white;
            font-weight: 700; flex-shrink: 0; border: 1px solid var(--border-color);
        }
        
        .emoji-icon { font-size: 24px; line-height: 1; flex-shrink: 0; }
        
        .poo-btn {
            background: #f8f8f8; border: 1px solid var(--border-color);
            box-shadow: 1px 1px 0 var(--gray); transition: all 0.1s;
            cursor: pointer;
        }
        .poo-btn:active { transform: translate(1px, 1px); box-shadow: 0 0 0 var(--gray); }
        .poo-btn-active { background: var(--primary) !important; color: white; }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-gray { background: var(--gray); color: black; }
        
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s; }
        .collapsible-content.open { max-height: 500px; }
        
        .stats-bar-bg {
            position: absolute; top: 0; left: 0; height: 100%;
            background: var(--primary); transition: width 0.5s; z-index: 1;
        }
        
        .header-compact { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; }
        .header-title { font-size: 15px; font-weight: 900; white-space: nowrap; letter-spacing: -0.5px; }
        .header-toggle-btn { padding: 5px 7px; font-size: 9px; white-space: nowrap; }
        .clear-data-btn { background: #e76f51; color: white; border: 1px solid var(--border-color); padding: 5px 7px; font-size: 9px; font-weight: 700; box-shadow: 1px 1px 0 var(--gray); cursor: pointer; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="p-2 z-10 flex-shrink-0" style="background: var(--primary); border-bottom: var(--border-width) solid var(--border-color);">
        <div class="header-compact mb-2">
            <h1 class="header-title" style="color: white;">🚿 ASEO</h1>
            <div id="current-date" class="text-[8px] font-bold text-white px-2 py-0.5" style="background: var(--secondary);"></div>
            <button onclick="toggleMenu('function-menu')" class="header-toggle-btn flex-1 brutal-btn bg-white" style="color: var(--border-color);">
                📋 FUNCIONES
            </button>
            <button onclick="toggleMenu('sort-menu')" class="header-toggle-btn flex-1 brutal-btn bg-white" style="color: var(--border-color);">
                📥 ORDENAR
            </button>
            <button onclick="clearData()" class="clear-data-btn">🗑️</button>
        </div>
        
        <div id="function-menu" class="collapsible-content open">
            <div class="grid grid-cols-4 gap-2 pt-2 pb-2">
                <button onclick="setFunc(5)" id="btn-5" class="py-2.5 brutal-btn btn-primary">F5<span class="block text-[8px]">UCC</span></button>
                <button onclick="setFunc(6)" id="btn-6" class="py-2.5 brutal-btn bg-gray-100" style="color: var(--border-color);">F6<span class="block text-[8px]">UCC</span></button>
                <button onclick="setFunc(8)" id="btn-8" class="py-2.5 brutal-btn bg-gray-100" style="color: var(--border-color);">F8<span class="block text-[8px]">UAD</span></button>
                <button onclick="setFunc(9)" id="btn-9" class="py-2.5 brutal-btn bg-gray-100" style="color: var(--border-color);">F9<span class="block text-[8px]">UAD</span></button>
            </div>
        </div>

        <div id="sort-menu" class="collapsible-content">
            <div class="grid grid-cols-4 gap-2 pt-2 pb-2">
                <button onclick="setSort('priority')" id="sort-priority" class="brutal-btn btn-accent">🔝 PRIOR</button>
                <button onclick="setSort('shower')" id="sort-shower" class="brutal-btn bg-white" style="color: var(--border-color);">🚿 DUCHA</button>
                <button onclick="setSort('room')" id="sort-room" class="brutal-btn bg-white" style="color: var(--border-color);">🏠 HABIT</button>
                <button onclick="setSort('alpha')" id="sort-alpha" class="brutal-btn bg-white" style="color: var(--border-color);">🔤 A-Z</button>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-2 pb-20 scroll-smooth no-scrollbar" id="main-scroll">
        <div id="active-list" class="space-y-2"></div>
        <div id="completed-section" class="mt-6 hidden">
            <h3 class="text-white font-bold uppercase text-[9px] mb-2 px-2 py-1" style="background: var(--secondary);">✅ COMPLETADOS</h3>
            <div id="completed-list" class="space-y-2"></div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full z-20">
        <div class="relative" style="background: var(--secondary);">
            <div id="progress-fill" class="stats-bar-bg" style="width: 0%"></div>
            <div class="relative z-2 py-2.5 text-center text-white font-bold text-xs" id="stats-text">0 / 0</div>
        </div>
    </footer>

    <script>
        let DB = {};

        async function loadResidents() {
            try {
                const basePath = window.location.pathname.includes('Duchas-Aseos') ? '/Duchas-Aseos' : '';
                const response = await fetch(basePath + '/residentes.json');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                DB = await response.json();
                console.log('✅ Residentes cargados:', Object.keys(DB).length, 'funciones');
                render();
            } catch (error) {
                console.error('❌ Error cargando residentes:', error);
                alert('Error: ' + error.message);
            }
        }

        const DAYS = ['L','M','X','J','V','S','D'];
        const DAY_MAP = ['D','L','M','X','J','V','S'];
        const STORAGE_KEY = 'aseo_progress_v10';
        
        let func = 5, sort = 'priority';
        let allData = { done: {}, poo: {} };

        const $ = id => document.getElementById(id);
        const today = () => DAY_MAP[new Date().getDay()];
        const dateStr = () => { const d = new Date(); return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}`; };

        function loadAllData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    allData = JSON.parse(saved);
                    if (!allData.done) allData.done = {};
                    if (!allData.poo) allData.poo = {};
                }
            } catch (e) { allData = { done: {}, poo: {} }; }
        }

        function saveAllData() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(allData)); } catch (e) {}
        }

        function getDoneSet() { return new Set(allData.done[func] || []); }
        function getPooSet() { return new Set(allData.poo[func] || []); }
        function setDoneSet(set) { allData.done[func] = [...set]; }
        function setPooSet(set) { allData.poo[func] = [...set]; }

        function clearData() {
            if (confirm('¿BORRAR TODO EL PROGRESO?')) {
                localStorage.removeItem(STORAGE_KEY);
                allData = { done: {}, poo: {} };
                render();
            }
        }

        function toggleMenu(id) {
            const menu = $(id);
            menu.classList.toggle('open');
        }

        function createCard(p, isDone, day) {
            const showerToday = p.days.includes(day);
            const hasPoo = getPooSet().has(p.id);
            
            const div = document.createElement('div');
            div.className = `card brutal-border p-2.5 flex items-center gap-2.5 ${isDone ? 'completed-card' : ''} ${p.p === 1 ? 'priority-top' : p.p === 2 ? 'priority-meal' : 'priority-normal'}`;
            div.id = `card-${p.id}`;
            div.style.position = 'relative';
            div.style.overflow = 'hidden';
            div.style.cursor = 'grab';
            div.style.touchAction = 'pan-y';
            div.style.userSelect = 'none';
            div.style.willChange = 'transform';
            
            // Badge
            if (p.p === 1) {
                const badge = document.createElement('div');
                badge.className = 'priority-badge';
                badge.textContent = '🔝';
                div.appendChild(badge);
            } else if (p.p === 2) {
                const badge = document.createElement('div');
                badge.className = 'meal-badge';
                badge.textContent = '☕';
                div.appendChild(badge);
            }
            
            // Swipe indicators
            const leftIndicator = document.createElement('div');
            leftIndicator.className = 'swipe-indicator left';
            leftIndicator.textContent = '✓';
            div.appendChild(leftIndicator);
            
            const rightIndicator = document.createElement('div');
            rightIndicator.className = 'swipe-indicator right';
            rightIndicator.textContent = '✓';
            div.appendChild(rightIndicator);
            
            // Room badge
            const roomBadge = document.createElement('div');
            roomBadge.className = 'room-badge w-9 h-9 flex items-center justify-center text-sm';
            roomBadge.textContent = p.room;
            div.appendChild(roomBadge);
            
            // Name and days container
            const infoDiv = document.createElement('div');
            infoDiv.className = 'flex-1 min-w-0';
            
            const nameEl = document.createElement('h2');
            nameEl.className = 'text-sm font-bold uppercase tracking-tight';
            nameEl.style.color = 'var(--border-color)';
            nameEl.textContent = p.name;
            infoDiv.appendChild(nameEl);
            
            const daysDiv = document.createElement('div');
            daysDiv.className = 'flex gap-0.5 mt-0.5 overflow-x-auto no-scrollbar';
            DAYS.forEach(d => {
                const has = p.days.includes(d);
                const dayBadge = document.createElement('div');
                dayBadge.className = `day-badge ${has ? (d === day ? 'day-has-shower-today' : 'day-has-shower-other') : 'day-no-shower'}`;
                dayBadge.textContent = d;
                daysDiv.appendChild(dayBadge);
            });
            infoDiv.appendChild(daysDiv);
            div.appendChild(infoDiv);
            
            // Emojis
            const emojiDiv = document.createElement('div');
            emojiDiv.className = 'flex gap-0.5 items-center';
            const priorityEmoji = p.p === 1 ? '🔝' : p.p === 2 ? '☕' : '';
            if (priorityEmoji) {
                const e1 = document.createElement('span');
                e1.className = 'emoji-icon';
                e1.textContent = priorityEmoji;
                emojiDiv.appendChild(e1);
            } else {
                const e1 = document.createElement('span');
                e1.className = 'emoji-icon';
                e1.style.visibility = 'hidden';
                e1.textContent = '🔝';
                emojiDiv.appendChild(e1);
            }
            if (showerToday) {
                const e2 = document.createElement('span');
                e2.className = 'emoji-icon';
                e2.textContent = '🚿';
                emojiDiv.appendChild(e2);
            } else {
                const e2 = document.createElement('span');
                e2.className = 'emoji-icon';
                e2.style.visibility = 'hidden';
                e2.textContent = '🚿';
                emojiDiv.appendChild(e2);
            }
            div.appendChild(emojiDiv);
            
            // Poo button
            const pooBtn = document.createElement('button');
            pooBtn.className = `poo-btn w-7 h-7 flex items-center justify-center text-base`;
            pooBtn.textContent = hasPoo ? '💩' : '🚽';
            pooBtn.onclick = (e) => {
                e.stopPropagation();
                togglePoo(p.id, pooBtn);
            };
            div.appendChild(pooBtn);
            
            // Swipe functionality - FIXED with Web Animations API
            let startX = 0, currentX = 0, isSwiping = false;
            const threshold = 80;
            let currentAnimation = null;
            
            div.addEventListener('touchstart', (e) => {
                if (e.target === pooBtn) return;
                startX = e.touches[0].clientX;
                isSwiping = true;
                div.classList.add('card-swiping');
                
                // Cancel any existing animation
                if (currentAnimation) {
                    currentAnimation.cancel();
                    currentAnimation = null;
                }
                
                div.style.transition = 'none';
                div.style.transform = 'translateX(0)';
            }, { passive: true });
            
            div.addEventListener('touchmove', (e) => {
                if (!isSwiping || e.target === pooBtn) return;
                currentX = e.touches[0].clientX;
                const diff = currentX - startX;
                
                // Move card in the EXACT direction of swipe
                div.style.transform = `translateX(${diff}px)`;
                
                if (diff < -15) {
                    div.classList.add('swiping-left');
                    div.classList.remove('swiping-right');
                } else if (diff > 15) {
                    div.classList.add('swiping-right');
                    div.classList.remove('swiping-left');
                }
            }, { passive: true });
            
            div.addEventListener('touchend', (e) => {
                if (!isSwiping) return;
                isSwiping = false;
                const diff = currentX - startX;
                
                if (Math.abs(diff) > threshold) {
                    div.classList.remove('card-swiping', 'swiping-left', 'swiping-right');
                    
                    const doneSet = getDoneSet();
                    const wasDone = doneSet.has(p.id);
                    
                    // Determine swipe direction
                    const swipeDirection = diff > 0 ? 'right' : 'left';
                    const endPosition = diff > 0 ? 350 : -350;
                    
                    if (wasDone) {
                        // Reactivate - always slide in from left
                        doneSet.delete(p.id);
                        setDoneSet(doneSet);
                        saveAllData();
                        
                        // Animate from left to center
                        currentAnimation = div.animate([
                            { transform: 'translateX(-350px)', opacity: 0 },
                            { transform: 'translateX(0)', opacity: 1 }
                        ], {
                            duration: 300,
                            easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
                            fill: 'forwards'
                        });
                        
                        currentAnimation.onfinish = () => {
                            div.style.transform = '';
                            div.style.opacity = '';
                        };
                        
                        particles(div.getBoundingClientRect().left + div.offsetWidth/2, div.getBoundingClientRect().top + 20, 'reactivate');
                        $('completed-section').classList.add('section-highlight');
                        setTimeout(() => $('completed-section').classList.remove('section-highlight'), 400);
                        setTimeout(() => render(), 300);
                        
                    } else {
                        // Deactivate - slide out in SWIPE DIRECTION
                        doneSet.add(p.id);
                        setDoneSet(doneSet);
                        saveAllData();
                        
                        // Animate from CURRENT position to end position (continues the swipe motion)
                        currentAnimation = div.animate([
                            { transform: `translateX(${diff}px)`, opacity: 1 },
                            { transform: `translateX(${endPosition}px)`, opacity: 0 }
                        ], {
                            duration: 250,
                            easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
                            fill: 'forwards'
                        });
                        
                        currentAnimation.onfinish = () => {
                            div.style.transform = '';
                            div.style.opacity = '';
                        };
                        
                        particles(div.getBoundingClientRect().left + div.offsetWidth/2, div.getBoundingClientRect().top + 20, 'complete');
                        $('completed-section').classList.add('section-highlight');
                        setTimeout(() => $('completed-section').classList.remove('section-highlight'), 400);
                        setTimeout(() => render(), 300);
                    }
                    
                    div.style.pointerEvents = 'none';
                    
                } else {
                    // Reset - spring back to center
                    div.style.transition = 'transform 0.25s cubic-bezier(0.4, 0, 0.2, 1)';
                    div.style.transform = 'translateX(0)';
                    div.classList.remove('swiping-left', 'swiping-right');
                    
                    setTimeout(() => {
                        div.style.transition = '';
                    }, 250);
                }
            });
            
            div.addEventListener('touchcancel', () => {
                isSwiping = false;
                div.style.transition = 'transform 0.25s cubic-bezier(0.4, 0, 0.2, 1)';
                div.style.transform = 'translateX(0)';
                div.classList.remove('swiping-left', 'swiping-right', 'card-swiping');
                
                setTimeout(() => {
                    div.style.transition = '';
                }, 250);
            });
            
            return div;
        }

        function particles(x, y, type) {
            const colors = type === 'complete' ? ['var(--primary)', 'var(--secondary)'] : ['var(--accent)', 'var(--gray-dark)'];
            const count = type === 'complete' ? 6 : 4;
            
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.cssText = `
                    left: ${x + (i - count/2) * 8}px;
                    top: ${y}px;
                    background: ${colors[i % colors.length]};
                    animation-delay: ${i * 0.05}s;
                `;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 400);
            }
        }

        function togglePoo(id, btn) {
            const pooSet = getPooSet();
            if (pooSet.has(id)) { 
                pooSet.delete(id); 
            } else {
                pooSet.add(id);
                if (navigator.vibrate) navigator.vibrate(30);
            }
            setPooSet(pooSet);
            saveAllData();
            render();
        }

        function setFunc(f) {
            saveAllData();
            func = f;
            [5,6,8,9].forEach(n => {
                $('btn-'+n).className = `py-2.5 brutal-btn ${n===f?'btn-primary':'bg-gray-100'}`;
                if (n !== f) $('btn-'+n).style.color = 'var(--border-color)';
            });
            render();
        }

        function setSort(s) {
            sort = s;
            ['priority','shower','room','alpha'].forEach(t => {
                $('sort-'+t).className = `brutal-btn ${t===s?'btn-accent':'bg-white'}`;
                if (t !== s) $('sort-'+t).style.color = 'var(--border-color)';
            });
            render();
        }

        function render() {
            const day = today();
            const list = DB[func] || [];
            const doneSet = getDoneSet();
            const pooSet = getPooSet();
            const active = list.filter(p => !doneSet.has(p.id));
            const completed = list.filter(p => doneSet.has(p.id));

            active.sort((a,b) => {
                if (sort === 'priority') return a.p - b.p || a.room - b.room;
                if (sort === 'room') return a.room - b.room;
                if (sort === 'alpha') return a.name.localeCompare(b.name);
                if (sort === 'shower') {
                    const ah = a.days.includes(day) ? 1 : 0, bh = b.days.includes(day) ? 1 : 0;
                    return bh - ah || a.name.localeCompare(b.name);
                }
                return 0;
            });

            const activeContainer = $('active-list');
            activeContainer.innerHTML = '';
            if (active.length) {
                active.forEach(p => {
                    activeContainer.appendChild(createCard(p, false, day));
                });
            } else {
                activeContainer.innerHTML = '<div class="text-center py-10 brutal-border bg-white"><div class="text-4xl mb-3">✓</div><div class="text-lg font-bold" style="color: var(--secondary);">TODO OK</div></div>';
            }
            
            const compSection = $('completed-section');
            const completedContainer = $('completed-list');
            completedContainer.innerHTML = '';
            if (completed.length) {
                compSection.classList.remove('hidden');
                completed.forEach(p => {
                    completedContainer.appendChild(createCard(p, true, day));
                });
            } else { 
                compSection.classList.add('hidden'); 
            }

            const pct = list.length ? Math.round(completed.length / list.length * 100) : 0;
            $('stats-text').textContent = `${completed.length}/${list.length} (${pct}%)`;
            $('progress-fill').style.width = pct + '%';
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/Duchas-Aseos/sw.js')
                    .then(reg => console.log('✅ SW registrado:', reg.scope))
                    .catch(err => console.log('❌ SW error:', err));
            });
        }

        window.addEventListener('beforeunload', () => { saveAllData(); });

        $('current-date').textContent = dateStr();
        loadAllData();
        loadResidents();
    </script>
</body>
</html>
