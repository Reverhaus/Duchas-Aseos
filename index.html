<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#bdc800">
    <meta name="description" content="App para gestión de duchas y aseo de residentes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aseo">
    <title>Gestión de Aseo - UCC/UAD</title>
    <link rel="manifest" href="/Duchas-Aseos/manifest.json">
    <link rel="apple-touch-icon" href="/Duchas-Aseos/icons/icon-192.png">
    <link rel="icon" type="image/png" href="/Duchas-Aseos/icons/icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Mono', monospace; -webkit-tap-highlight-color: transparent; background: #fafaf8; }
        
        :root {
            --primary: #bdc800;
            --primary-dark: #9db000;
            --secondary: #235b4e;
            --secondary-dark: #1a4539;
            --secondary-light: #3d7a6b;
            --accent: #e3a352;
            --accent-dark: #c98d3a;
            --border-color: #235b4e;
            --border-width: 2px;
            --shadow-offset: 3px;
        }
        
        * { border-radius: 4px !important; }
        
        .brutal-border { 
            border: var(--border-width) solid var(--border-color); 
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0 var(--secondary-light);
            transition: all 0.2s;
        }
        
        .brutal-btn { 
            border: var(--border-width) solid var(--border-color); 
            box-shadow: 2px 2px 0 var(--secondary-light);
            transition: all 0.1s;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 10px;
        }
        .brutal-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--secondary-light); }
        
        .priority-top { border-left: 4px solid var(--accent); background: linear-gradient(90deg, rgba(227, 163, 82, 0.1) 0%, transparent 100%); }
        .priority-meal { border-left: 4px solid var(--secondary); background: linear-gradient(90deg, rgba(35, 91, 78, 0.1) 0%, transparent 100%); }
        .priority-normal { border-left: 4px solid #ccc; }
        
        .completed-card { opacity: 0.35; filter: grayscale(80%); }
        .completed-card .poo-btn-active { filter: grayscale(0%); opacity: 1; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .card-swiping { transition: transform 0.1s; }
        .card-swiped { animation: swipeOut 0.4s ease-out forwards; }
        
        @keyframes swipeOut {
            0% { transform: translateX(0) rotate(0); opacity: 1; }
            100% { transform: translateX(400px) rotate(15deg); opacity: 0; }
        }
        
        .swipe-indicator {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 28px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .swipe-indicator.left { left: 10px; }
        .swipe-indicator.right { right: 10px; }
        .card.swiping-left .swipe-indicator.left { opacity: 1; }
        .card.swiping-right .swipe-indicator.right { opacity: 1; }
        
        .confetti {
            position: fixed; width: 8px; height: 8px;
            animation: confettiFall 0.6s ease-out forwards;
            pointer-events: none; z-index: 1000;
            border-radius: 2px;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(80px) rotate(360deg); opacity: 0; }
        }
        
        .section-highlight { animation: sectionGlow 0.4s ease-out; }
        @keyframes sectionGlow {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(189, 200, 0, 0.15); }
        }
        
        .priority-badge, .meal-badge {
            position: absolute; top: -4px; right: -4px;
            color: var(--white); font-size: 9px; font-weight: 700;
            padding: 2px 5px; border: 1px solid var(--border-color);
            box-shadow: 1px 1px 0 var(--secondary-light);
        }
        .priority-badge { background: var(--accent); }
        .meal-badge { background: var(--secondary); }
        
        .day-badge {
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-color); font-weight: 700; font-size: 9px;
            text-transform: uppercase; flex-shrink: 0; font-family: 'Roboto Mono', monospace;
        }
        .day-has-shower-today { background: var(--primary); color: var(--white); }
        .day-has-shower-other { background: var(--secondary-light); color: var(--white); }
        .day-no-shower { background: #f0f0f0; color: #bbb; }
        
        .room-badge {
            background: var(--secondary); color: var(--white);
            font-weight: 700; flex-shrink: 0; border: 1px solid var(--border-color);
        }
        
        .emoji-icon { font-size: 24px; line-height: 1; flex-shrink: 0; }
        
        .poo-btn {
            background: #f8f8f8; border: 1px solid var(--border-color);
            box-shadow: 1px 1px 0 var(--secondary-light); transition: all 0.1s;
        }
        .poo-btn:active { transform: translate(1px, 1px); box-shadow: 0 0 0 var(--secondary-light); }
        .poo-btn-active { background: var(--secondary) !important; color: white; }
        
        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-secondary { background: var(--secondary); color: var(--white); }
        .btn-accent { background: var(--accent); color: var(--white); }
        
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s; }
        .collapsible-content.open { max-height: 500px; }
        
        .stats-bar-bg {
            position: absolute; top: 0; left: 0; height: 100%;
            background: var(--primary); transition: width 0.5s; z-index: 1;
        }
        
        .header-compact { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; }
        .header-title { font-size: 15px; font-weight: 900; white-space: nowrap; letter-spacing: -0.5px; }
        .header-toggle-btn { padding: 5px 7px; font-size: 9px; white-space: nowrap; }
        .clear-data-btn { background: #e76f51; color: white; border: 1px solid var(--border-color); padding: 5px 7px; font-size: 9px; font-weight: 700; box-shadow: 1px 1px 0 var(--secondary-light); }
        
        .swipe-hint {
            position: fixed; bottom: 75px; left: 50%; transform: translateX(-50%);
            background: var(--secondary); color: var(--white); padding: 6px 14px;
            font-size: 10px; font-weight: 700; z-index: 100;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b-2 p-2 z-10 flex-shrink-0" style="border-color: var(--border-color);">
        <div class="header-compact mb-2">
            <h1 class="header-title" style="color: var(--secondary);">🚿 ASEO</h1>
            <div id="current-date" class="text-[8px] font-bold text-white px-2 py-0.5" style="background: var(--secondary);"></div>
            <button onclick="toggleMenu('function-menu')" class="header-toggle-btn flex-1 brutal-btn bg-white" style="color: var(--border-color);">
                📋 FUNCIONES
            </button>
            <button onclick="toggleMenu('sort-menu')" class="header-toggle-btn flex-1 brutal-btn bg-white" style="color: var(--border-color);">
                📥 ORDENAR
            </button>
            <button onclick="clearData()" class="clear-data-btn">🗑️</button>
        </div>
        
        <div id="function-menu" class="collapsible-content open">
            <div class="grid grid-cols-4 gap-2 pt-2 pb-2">
                <button onclick="setFunc(5)" id="btn-5" class="py-2.5 brutal-btn btn-primary">F5<span class="block text-[8px]">UCC</span></button>
                <button onclick="setFunc(6)" id="btn-6" class="py-2.5 brutal-btn bg-gray-100" style="color: var(--border-color);">F6<span class="block text-[8px]">UCC</span></button>
                <button onclick="setFunc(8)" id="btn-8" class="py-2.5 brutal-btn bg-gray-100" style="color: var(--border-color);">F8<span class="block text-[8px]">UAD</span></button>
                <button onclick="setFunc(9)" id="btn-9" class="py-2.5 brutal-btn bg-gray-100" style="color: var(--border-color);">F9<span class="block text-[8px]">UAD</span></button>
            </div>
        </div>

        <div id="sort-menu" class="collapsible-content">
            <div class="grid grid-cols-4 gap-2 pt-2 pb-2">
                <button onclick="setSort('priority')" id="sort-priority" class="brutal-btn btn-accent">🔝 PRIOR</button>
                <button onclick="setSort('shower')" id="sort-shower" class="brutal-btn bg-white" style="color: var(--border-color);">🚿 DUCHA</button>
                <button onclick="setSort('room')" id="sort-room" class="brutal-btn bg-white" style="color: var(--border-color);">🏠 HABIT</button>
                <button onclick="setSort('alpha')" id="sort-alpha" class="brutal-btn bg-white" style="color: var(--border-color);">🔤 A-Z</button>
            </div>
        </div>
    </header>

    <div class="px-2 py-1.5 flex gap-2 text-[8px] flex-shrink-0 flex-wrap items-center" style="background: var(--secondary); color: white;">
        <span class="font-bold">LEYENDA:</span>
        <span class="brutal-btn btn-accent px-1.5 py-0.5 text-[7px]">🔝</span>
        <span class="brutal-btn btn-secondary px-1.5 py-0.5 text-[7px]">☕</span>
        <span class="day-badge day-has-shower-today">V</span><span>HOY</span>
        <span class="day-badge day-has-shower-other">X</span><span>DUCHA</span>
    </div>

    <div class="swipe-hint">👈 DESLIZA PARA COMPLETAR 👉</div>

    <main class="flex-1 overflow-y-auto p-2 pb-28 scroll-smooth no-scrollbar" id="main-scroll">
        <div id="active-list" class="space-y-2"></div>
        <div id="completed-section" class="mt-6 hidden">
            <h3 class="text-white font-bold uppercase text-[9px] mb-2 px-2 py-1" style="background: var(--secondary);">✅ COMPLETADOS</h3>
            <div id="completed-list" class="space-y-2"></div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full z-20">
        <div class="bg-white border-t px-2 py-1.5 flex justify-center gap-4 text-[8px] font-bold" style="border-color: var(--border-color);">
            <div class="flex items-center gap-1"><div class="w-5 h-5 flex items-center justify-center text-white" style="background: var(--secondary);">✓</div><span>ASEO OK</span></div>
            <div class="flex items-center gap-1"><div class="w-5 h-5 flex items-center justify-center text-white" style="background: var(--secondary);">💩</div><span>DEPOS</span></div>
        </div>
        <div class="relative" style="background: var(--secondary);">
            <div id="progress-fill" class="stats-bar-bg" style="width: 0%"></div>
            <div class="relative z-2 py-2.5 text-center text-white font-bold text-xs" id="stats-text">0 / 0</div>
        </div>
    </footer>

    <script>
        let DB = {};

        async function loadResidents() {
            try {
                const basePath = window.location.pathname.includes('Duchas-Aseos') ? '/Duchas-Aseos' : '';
                const response = await fetch(basePath + '/residentes.json');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                DB = await response.json();
                console.log('✅ Residentes cargados:', Object.keys(DB).length, 'funciones');
                render();
            } catch (error) {
                console.error('❌ Error cargando residentes:', error);
                alert('Error: ' + error.message);
            }
        }

        const DAYS = ['L','M','X','J','V','S','D'];
        const DAY_MAP = ['D','L','M','X','J','V','S'];
        const STORAGE_KEY = 'aseo_progress_v4';
        
        let func = 5, sort = 'priority';
        let allData = { done: {}, poo: {} };

        const $ = id => document.getElementById(id);
        const today = () => DAY_MAP[new Date().getDay()];
        const dateStr = () => { const d = new Date(); return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}`; };

        function loadAllData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    allData = JSON.parse(saved);
                    if (!allData.done) allData.done = {};
                    if (!allData.poo) allData.poo = {};
                }
            } catch (e) { allData = { done: {}, poo: {} }; }
        }

        function saveAllData() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(allData)); } catch (e) {}
        }

        function getDoneSet() { return new Set(allData.done[func] || []); }
        function getPooSet() { return new Set(allData.poo[func] || []); }
        function setDoneSet(set) { allData.done[func] = [...set]; }
        function setPooSet(set) { allData.poo[func] = [...set]; }

        function clearData() {
            if (confirm('¿BORRAR TODO EL PROGRESO?')) {
                localStorage.removeItem(STORAGE_KEY);
                allData = { done: {}, poo: {} };
                render();
            }
        }

        function toggleMenu(id) {
            const menu = $(id);
            menu.classList.toggle('open');
        }

        function createCard(p, isDone, day) {
            const showerToday = p.days.includes(day);
            const hasPoo = getPooSet().has(p.id);
            const badge = p.p === 1 ? '<div class="priority-badge">🔝</div>' : p.p === 2 ? '<div class="meal-badge">☕</div>' : '';
            const emoji = p.p === 1 ? '🔝' : p.p === 2 ? '☕' : '';
            
            const div = document.createElement('div');
            div.className = `card brutal-border bg-white p-2.5 flex items-center gap-2.5 ${isDone ? 'completed-card' : ''} ${p.p === 1 ? 'priority-top' : p.p === 2 ? 'priority-meal' : 'priority-normal'}`;
            div.id = `card-${p.id}`;
            div.style.position = 'relative';
            div.style.overflow = 'hidden';
            
            div.innerHTML = `
                ${badge}
                <div class="swipe-indicator left">✅</div>
                <div class="swipe-indicator right">✅</div>
                <div class="room-badge w-9 h-9 flex items-center justify-center text-sm">${p.room}</div>
                <div class="flex-1 min-w-0">
                    <h2 class="text-sm font-bold uppercase tracking-tight" style="color: var(--border-color);">${p.name}</h2>
                    <div class="flex gap-0.5 mt-0.5 overflow-x-auto no-scrollbar">${DAYS.map(d => {
                        const has = p.days.includes(d);
                        const cls = has ? (d === day ? 'day-has-shower-today' : 'day-has-shower-other') : 'day-no-shower';
                        return `<div class="day-badge ${cls}">${d}</div>`;
                    }).join('')}</div>
                </div>
                <div class="flex gap-0.5 items-center">${emoji ? `<span class="emoji-icon">${emoji}</span>` : '<span class="emoji-icon" style="visibility:hidden">🔝</span>'}${showerToday ? '<span class="emoji-icon">🚿</span>' : '<span class="emoji-icon" style="visibility:hidden">🚿</span>'}</div>
                <button class="poo-btn w-7 h-7 flex items-center justify-center text-base" onclick="toggle('${p.id}',this,event,'poo')">${hasPoo ? '💩' : '🚽'}</button>
            `;
            
            // Swipe gestures
            let startX, currentX, isSwiping = false;
            const threshold = 100;
            
            div.addEventListener('touchstart', (e) => {
                if (e.target.classList.contains('poo-btn')) return;
                startX = e.touches[0].clientX;
                isSwiping = true;
                div.classList.add('card-swiping');
            }, { passive: true });
            
            div.addEventListener('touchmove', (e) => {
                if (!isSwiping || e.target.classList.contains('poo-btn')) return;
                currentX = e.touches[0].clientX;
                const diff = currentX - startX;
                if (Math.abs(diff) > 10) {
                    div.style.transform = `translateX(${diff}px) rotate(${diff / 25}deg)`;
                    div.classList.toggle('swiping-left', diff < -20);
                    div.classList.toggle('swiping-right', diff > 20);
                }
            }, { passive: true });
            
            div.addEventListener('touchend', (e) => {
                if (!isSwiping || e.target.classList.contains('poo-btn')) return;
                isSwiping = false;
                const diff = currentX - startX;
                
                if (Math.abs(diff) > threshold) {
                    div.classList.remove('card-swiping');
                    div.classList.add('card-swiped');
                    div.style.pointerEvents = 'none';
                    
                    const doneSet = getDoneSet();
                    doneSet.add(p.id);
                    setDoneSet(doneSet);
                    saveAllData();
                    
                    confetti(div.getBoundingClientRect().left + div.offsetWidth/2, div.getBoundingClientRect().top + 20);
                    $('completed-section').classList.add('section-highlight');
                    setTimeout(() => $('completed-section').classList.remove('section-highlight'), 400);
                    
                    setTimeout(() => render(), 400);
                } else {
                    div.style.transform = '';
                    div.classList.remove('swiping-left', 'swiping-right', 'card-swiping');
                }
            });
            
            return div;
        }

        function confetti(x, y) {
            const colors = ['#bdc800','#235b4e','#e3a352','#3d7a6b'];
            for (let i = 0; i < 12; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.cssText = `left:${x+(Math.random()-0.5)*60}px;top:${y+(Math.random()-0.5)*40}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*0.1}s`;
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 600);
            }
        }

        function toggle(id, btn, e, type) {
            e.stopPropagation();
            const pooSet = getPooSet();
            
            if (type === 'poo') {
                if (pooSet.has(id)) { pooSet.delete(id); } 
                else {
                    pooSet.add(id);
                    if (navigator.vibrate) navigator.vibrate(30);
                }
                setPooSet(pooSet);
                saveAllData();
                render();
            }
        }

        function setFunc(f) {
            saveAllData();
            func = f;
            [5,6,8,9].forEach(n => {
                $('btn-'+n).className = `py-2.5 brutal-btn ${n===f?'btn-primary':'bg-gray-100'}`;
                if (n !== f) $('btn-'+n).style.color = 'var(--border-color)';
            });
            render();
        }

        function setSort(s) {
            sort = s;
            ['priority','shower','room','alpha'].forEach(t => {
                $('sort-'+t).className = `brutal-btn ${t===s?'btn-accent':'bg-white'}`;
                if (t !== s) $('sort-'+t).style.color = 'var(--border-color)';
            });
            render();
        }

        function render() {
            const day = today();
            const list = DB[func] || [];
            const doneSet = getDoneSet();
            const pooSet = getPooSet();
            const active = list.filter(p => !doneSet.has(p.id));
            const completed = list.filter(p => doneSet.has(p.id));

            active.sort((a,b) => {
                if (sort === 'priority') return a.p - b.p || a.room - b.room;
                if (sort === 'room') return a.room - b.room;
                if (sort === 'alpha') return a.name.localeCompare(b.name);
                if (sort === 'shower') {
                    const ah = a.days.includes(day) ? 1 : 0, bh = b.days.includes(day) ? 1 : 0;
                    return bh - ah || a.name.localeCompare(b.name);
                }
                return 0;
            });

            $('active-list').innerHTML = active.length ? active.map(p => createCard(p,false,day).outerHTML).join('') : '<div class="text-center py-10 brutal-border bg-white"><div class="text-4xl mb-3">🎉</div><div class="text-lg font-bold" style="color: var(--secondary);">¡TODO OK!</div></div>';
            
            const compSection = $('completed-section');
            if (completed.length) {
                compSection.classList.remove('hidden');
                $('completed-list').innerHTML = completed.map(p => createCard(p,true,day).outerHTML).join('');
            } else { compSection.classList.add('hidden'); }

            const pct = list.length ? Math.round(completed.length / list.length * 100) : 0;
            $('stats-text').textContent = `${completed.length}/${list.length} (${pct}%)`;
            $('progress-fill').style.width = pct + '%';
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/Duchas-Aseos/sw.js')
                    .then(reg => console.log('✅ SW registrado:', reg.scope))
                    .catch(err => console.log('❌ SW error:', err));
            });
        }

        window.addEventListener('beforeunload', () => { saveAllData(); });

        $('current-date').textContent = dateStr();
        loadAllData();
        loadResidents();
    </script>
</body>
</html>
